name: D-ID Diagnóstico

on:
  workflow_dispatch:

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install python-dotenv

      - name: Listar avatares D-ID
        env:
          DID_API_KEY: ${{ secrets.DID_API_KEY }}
          DID_EMAIL: ${{ secrets.DID_EMAIL }}
        run: python did_list_avatars.py
