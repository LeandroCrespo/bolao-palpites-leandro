name: Boletim do Mestre Leme

on:
  schedule:
    # Alvo: ~23h Brasília (após o fim dos jogos noturnos das 21h).
    # O cron do GitHub dispara com ~70-80min de atraso consistente,
    # então agendamos 01:20 UTC (22:20 BRT) para compensar:
    # na prática chega entre ~22:20 (sem atraso) e ~23:40 (atraso típico).
    - cron: '20 1 * * *'

  workflow_dispatch:
    inputs:
      launch:
        description: 'Gerar vídeo de lançamento (--launch)?'
        required: false
        default: 'false'
        type: boolean

jobs:
  boletim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar se a Copa está em andamento
        id: check_date
        run: |
          # Modo launch sempre roda, independente da data
          if [[ "${{ inputs.launch }}" == "true" ]]; then
            echo "Modo lançamento — ignorando verificação de data."
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          HOJE=$(date -u +%Y-%m-%d)
          INICIO_COPA="2026-06-11"
          FIM_COPA="2026-07-20"
          if [[ "$HOJE" < "$INICIO_COPA" ]]; then
            echo "Copa ainda não começou ($HOJE < $INICIO_COPA). Pulando."
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [[ "$HOJE" > "$FIM_COPA" ]]; then
            echo "Copa já encerrou ($HOJE > $FIM_COPA). Pulando."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Copa em andamento ($HOJE). Gerando boletim."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Gerar e enviar Boletim do Mestre Leme
        if: steps.check_date.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEON_CONNECTION_STRING: ${{ secrets.NEON_CONNECTION_STRING }}
          BOLAO_USER_ID: ${{ secrets.BOLAO_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ "${{ inputs.launch }}" == "true" ]]; then
            python main.py bulletin --launch
          else
            python main.py bulletin
          fi

      - name: Gerar e enviar Prompts de Video via Telegram
        if: steps.check_date.outputs.skip == 'false' && inputs.launch != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEON_CONNECTION_STRING: ${{ secrets.NEON_CONNECTION_STRING }}
          BOLAO_USER_ID: ${{ secrets.BOLAO_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py video --telegram

      - name: Registrar execução
        if: always()
        run: echo "Boletim executado em $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
