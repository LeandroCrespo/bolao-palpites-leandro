name: Copa 2026 - Reavaliação Pré-Jogo (30 min antes)

# O cron interno do GitHub Actions ("schedule") e' best-effort e pode
# atrasar por horas (ja' visto atraso de 8h46min num unico dia) -- isso
# faz a janela de pre-jogo de um jogo inteiro passar sem nenhuma execucao.
# Por isso cada disparo roda em loop interno por ~5h45min, verificando a
# cada 5 min, em vez de depender de um disparo pontual e exato do cron pra
# cada checagem. Repositorio e' publico, entao minutos do Actions sao
# ilimitados (sem custo). concurrency com cancel-in-progress garante que
# so' a execucao mais recente (com o codigo mais atual) fica rodando.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: pregame-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  reavaliar-pre-jogo:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar se a Copa está em andamento
        id: check_date
        run: |
          HOJE=$(date -u +%Y-%m-%d)
          if [[ "$HOJE" < "2026-06-11" || "$HOJE" > "2026-07-20" ]]; then
            echo "Fora do período da Copa ($HOJE). Pulando."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Reavaliar palpites em loop (~5h45min, a cada 5 min)
        if: steps.check_date.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BOLAO_USER_ID: ${{ secrets.BOLAO_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for i in $(seq 1 69); do
            python main.py pregame

            if ! git diff --quiet -- predictions.json; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add predictions.json
              git commit -m "Reavaliação pré-jogo (agente)"
              git pull --rebase --autostash || true
              git push || true
            fi

            sleep 300
          done
