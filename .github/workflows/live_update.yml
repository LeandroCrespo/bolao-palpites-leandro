name: Copa 2026 - Atualização Automática de Palpites

on:
  schedule:
    # Roda todos os dias às 03:00 UTC = 00:00 Brasília
    # Após cada rodada de jogos, captura os resultados e atualiza palpites
    - cron: '0 3 * * *'

  # Permite rodar manualmente pelo painel do GitHub (Actions > Run workflow)
  workflow_dispatch:

jobs:
  atualizar-palpites:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar se a Copa ja começou
        id: check_date
        run: |
          HOJE=$(date -u +%Y-%m-%d)
          INICIO_COPA="2026-06-11"
          FIM_COPA="2026-07-20"
          if [[ "$HOJE" < "$INICIO_COPA" ]]; then
            echo "Copa ainda nao comecou ($HOJE < $INICIO_COPA). Pulando."
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [[ "$HOJE" > "$FIM_COPA" ]]; then
            echo "Copa ja encerrou ($HOJE > $FIM_COPA). Pulando."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Copa em andamento ($HOJE). Rodando agente."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Executar agente de atualização
        if: steps.check_date.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BOLAO_USER_ID: ${{ secrets.BOLAO_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py live

      - name: Registrar execução
        if: always()
        run: echo "Execucao concluida em $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
