name: Copa 2026 - Atualização Automática de Palpites

on:
  # Disparo automático diário DESATIVADO a pedido do usuário, pra cortar
  # custo de API (era o maior consumidor de tokens do projeto). O agente
  # pré-jogo (pregame_update.yml) já faz uma análise completa por conta
  # própria perto de cada jogo, com a vantagem extra da escalação
  # confirmada — ele continua sendo a "palavra final" de qualquer forma.
  # Continua disponível via Run workflow manual se precisar.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-palpites:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar se a Copa ja começou
        id: check_date
        run: |
          HOJE=$(date -u +%Y-%m-%d)
          INICIO_COPA="2026-06-11"
          FIM_COPA="2026-07-20"
          if [[ "$HOJE" < "$INICIO_COPA" ]]; then
            echo "Copa ainda nao comecou ($HOJE < $INICIO_COPA). Pulando."
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [[ "$HOJE" > "$FIM_COPA" ]]; then
            echo "Copa ja encerrou ($HOJE > $FIM_COPA). Pulando."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Copa em andamento ($HOJE). Rodando agente."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Executar agente de atualização
        if: steps.check_date.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BOLAO_USER_ID: ${{ secrets.BOLAO_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py live

      - name: Salvar predictions.json atualizado
        if: steps.check_date.outputs.skip == 'false'
        run: |
          if ! git diff --quiet -- predictions.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add predictions.json
            git commit -m "Atualiza predictions.json (agente live)"
            git push
          else
            echo "predictions.json sem alteracoes"
          fi

      - name: Registrar execução
        if: always()
        run: echo "Execucao concluida em $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
